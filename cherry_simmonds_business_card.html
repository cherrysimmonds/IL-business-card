<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cherry Simmonds – Independent Lives</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #d6d6d6;
    font-family: 'Trebuchet MS', Trebuchet, Arial, sans-serif;
  }

  /* Outer stage: always fills the screen and centres the card */
  .stage {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* ── CARD ── Fixed at 700×330; JS scales it to fit any viewport */
  .card {
    width: 700px;
    height: 330px;
    display: flex;
    box-shadow: 0 8px 32px rgba(0,0,0,0.22);
    border-radius: 6px;
    overflow: hidden;
    transform-origin: center center;
    /* default scale set by JS */
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    width: 220px;
    min-width: 220px;
    background-color: #b456ae;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 14px 14px;
    gap: 16px;
  }
  .logo-wrap {
    width: 170px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-wrap img {
    width: 100%;
    height: auto;
  }
  .photo-wrap {
    width: 134px;
    height: 134px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid rgba(255,255,255,0.55);
    flex-shrink: 0;
  }
  .photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  /* ── RIGHT PANEL ── */
  .right-panel {
    flex: 1;
    background: #ffffff;
    display: flex;
    flex-direction: column;
  }
  .top-bar {
    background: #0097db;
    height: 10px;
    width: 100%;
    flex-shrink: 0;
  }
  .right-inner {
    flex: 1;
    padding: 14px 18px 12px 18px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* Name & Role */
  .name {
    font-size: 22px;
    font-weight: bold;
    color: #b456ae;
    font-family: 'Trebuchet MS', Trebuchet, Arial, sans-serif;
    line-height: 1.2;
    margin-bottom: 3px;
  }
  .role {
    font-size: 11.5px;
    color: #0097db;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-family: 'Trebuchet MS', Trebuchet, Arial, sans-serif;
    margin-bottom: 11px;
    font-weight: 600;
  }

  /* Contact details */
  .contact-block {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .contact-row {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    font-size: 11.5px;
    color: #333;
    font-family: 'Trebuchet MS', Trebuchet, Arial, sans-serif;
    line-height: 1.4;
  }
  .contact-label {
    font-weight: bold;
    color: #888;
    min-width: 14px;
    flex-shrink: 0;
    font-size: 11px;
  }
  .contact-value a {
    color: #333;
    text-decoration: none;
  }
  .contact-value a:hover { text-decoration: underline; }
  .location-text {
    color: #62a044;
    font-weight: 500;
  }

  /* Bottom row */
  .bottom-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-top: 6px;
  }
  .bottom-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .bottom-website {
    font-size: 11.5px;
    color: #62a044;
    font-weight: 600;
    font-family: 'Trebuchet MS', Trebuchet, Arial, sans-serif;
  }
  .bottom-charity {
    font-size: 9.5px;
    color: #aaa;
    font-family: 'Trebuchet MS', Trebuchet, Arial, sans-serif;
  }
  .qr-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .qr-block img {
    width: 60px;
    height: 60px;
    display: block;
  }
  .qr-label {
    font-size: 8.5px;
    color: #b456ae;
    font-family: 'Trebuchet MS', Trebuchet, Arial, sans-serif;
    text-align: center;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
</style>
</head>

<script>
  // Scale the card to fit the viewport, with padding, never exceeding 1:1
  function scaleCard() {
    var card = document.getElementById('card');
    var padding = 24; // px breathing room on each side
    var scaleX = (window.innerWidth  - padding * 2) / 700;
    var scaleY = (window.innerHeight - padding * 2) / 330;
    var scale  = Math.min(scaleX, scaleY, 1); // never enlarge beyond native size
    card.style.transform = 'scale(' + scale + ')';
  }

  scaleCard();
  window.addEventListener('resize',       scaleCard);
  window.addEventListener('orientationchange', function() {
    // Small delay lets the browser finish rotating before we recalculate
    setTimeout(scaleCard, 120);
  });
</script>
